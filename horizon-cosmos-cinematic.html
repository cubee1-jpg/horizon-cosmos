<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Horizon Cosmos</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,200;0,300;0,400;1,200;1,300&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:#000;font-family:'Cormorant Garamond',serif;color:#fff;}

@keyframes twinkle{0%,100%{opacity:.04}50%{opacity:.95}}
@keyframes nebula{0%,100%{transform:scale(1) rotate(0deg);opacity:.5}50%{transform:scale(1.1) rotate(4deg);opacity:.8}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes glow{0%,100%{opacity:.3}50%{opacity:.9}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.35}50%{transform:scale(1.14);opacity:.9}}
@keyframes titleFade{0%{opacity:0;letter-spacing:.9em}100%{opacity:1;letter-spacing:.18em}}
@keyframes lineGrow{from{width:0;opacity:0}to{width:min(300px,60vw);opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes cardReveal{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes db{0%,100%{opacity:.2;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}
@keyframes mp{0%,100%{box-shadow:0 0 0 0 rgba(0,200,168,.35)}50%{box-shadow:0 0 0 14px transparent}}
@keyframes aura{0%,100%{opacity:.2;transform:translateX(-50%) scale(1)}50%{opacity:.6;transform:translateX(-50%) scale(1.08)}}
@keyframes speaking{0%,100%{opacity:.4;transform:translateX(-50%) scale(1)}50%{opacity:1;transform:translateX(-50%) scale(1.18)}}
@keyframes particleDrift{0%{transform:translateY(0) translateX(0);opacity:0}15%{opacity:.8}85%{opacity:.4}100%{transform:translateY(-100px) translateX(var(--px,10px));opacity:0}}
@keyframes scanLine{from{transform:translateY(100vh)}to{transform:translateY(-100vh)}}

/* ── SPACE BG ── */
.space{position:fixed;inset:0;z-index:0;}
.space-deep{position:absolute;inset:0;background:radial-gradient(ellipse at 25% 40%,#060118 0%,#000008 45%,#000 100%);}
.neb-a{position:absolute;width:75vw;height:55vh;top:-8%;left:-8%;background:radial-gradient(ellipse,rgba(15,0,80,.5) 0%,rgba(0,15,100,.28) 45%,transparent 72%);filter:blur(45px);animation:nebula 20s ease-in-out infinite;}
.neb-b{position:absolute;width:65vw;height:50vh;bottom:-5%;right:-5%;background:radial-gradient(ellipse,rgba(0,50,80,.45) 0%,rgba(0,80,100,.2) 45%,transparent 72%);filter:blur(55px);animation:nebula 25s ease-in-out infinite reverse;}
.neb-c{position:absolute;width:45vw;height:38vh;top:35%;left:28%;background:radial-gradient(ellipse,rgba(50,0,90,.3) 0%,transparent 70%);filter:blur(65px);animation:nebula 18s ease-in-out infinite 5s;}
.stars{position:absolute;inset:0;}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d) var(--dl) infinite;}
.scan{position:absolute;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,180,160,.07),transparent);animation:scanLine 14s linear infinite;}

/* ── OPENING ── */
#op{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;background:#000;}
#op.out{transition:opacity 2s;opacity:0;pointer-events:none;}
.op-eye{font-family:'Rajdhani',sans-serif;font-size:clamp(8px,1.1vw,11px);letter-spacing:.55em;text-transform:uppercase;color:rgba(0,200,168,.55);opacity:0;animation:fadeUp .8s ease 1.2s both;}
.op-t{font-size:clamp(44px,9vw,108px);font-weight:200;letter-spacing:.18em;opacity:0;animation:titleFade 2.2s ease 1.8s both;text-align:center;line-height:1;}
.op-t em{font-style:italic;color:rgba(0,210,180,.88);}
.op-l{height:1px;background:linear-gradient(90deg,transparent,rgba(0,200,168,.55),rgba(201,168,76,.45),transparent);margin:22px auto;animation:lineGrow 1.2s ease 3.8s both;}
.op-s{font-family:'Rajdhani',sans-serif;font-size:clamp(8px,1.1vw,12px);letter-spacing:.5em;text-transform:uppercase;color:rgba(201,168,76,.5);opacity:0;animation:fadeUp .8s ease 4.2s both;}
.op-btn{font-family:'Rajdhani',sans-serif;font-size:clamp(9px,1vw,11px);letter-spacing:.4em;text-transform:uppercase;color:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.1);padding:11px 30px;cursor:pointer;margin-top:36px;opacity:0;animation:fadeUp .8s ease 5.2s both;transition:all .4s;background:transparent;}
.op-btn:hover{color:rgba(0,200,168,.8);border-color:rgba(0,200,168,.3);}

/* ── HUB ── */
#hub{position:fixed;inset:0;z-index:10;overflow-y:auto;opacity:0;pointer-events:none;transition:opacity 1s;}
#hub.on{opacity:1;pointer-events:all;}
#hub.off{display:none;}
.hub-head{text-align:center;padding:clamp(18px,3.5vh,36px) 16px clamp(8px,1.5vh,16px);position:relative;z-index:2;}
.hub-eye{font-family:'Rajdhani',sans-serif;font-size:7.5px;letter-spacing:.45em;text-transform:uppercase;color:rgba(0,200,168,.45);margin-bottom:5px;}
.hub-t{font-size:clamp(18px,3vw,34px);font-weight:200;letter-spacing:.14em;}
.hub-t em{font-style:italic;color:rgba(0,200,168,.8);}
.hub-div{height:1px;background:linear-gradient(90deg,transparent,rgba(0,200,168,.28),rgba(201,168,76,.22),transparent);margin:12px auto;max-width:480px;}
.sec{text-align:center;font-family:'Rajdhani',sans-serif;font-size:7px;letter-spacing:.45em;text-transform:uppercase;color:rgba(201,168,76,.28);padding:14px 0 5px;}

/* ── PORTRAIT CARDS ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px;padding:4px 12px 24px;max-width:1280px;margin:0 auto;position:relative;z-index:2;}
.card{position:relative;cursor:pointer;overflow:hidden;aspect-ratio:.68/1;background:#000;animation:cardReveal .65s ease both;animation-delay:var(--ad,0s);transition:transform .28s,box-shadow .28s;}
.card:hover{transform:scale(1.04) translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.7);}
.card:hover .card-vign{opacity:.2;}
.card:hover .card-line{width:75%;}
.card:hover .card-name{letter-spacing:.11em;}

/* Atmospheric gradient per companion */
.card-atm{position:absolute;inset:0;background:var(--atm);z-index:1;}
/* Bioluminescent particle drift */
.card-parts{position:absolute;inset:0;z-index:2;pointer-events:none;overflow:hidden;}
.prt{position:absolute;width:1.5px;height:1.5px;border-radius:50%;background:var(--col);animation:particleDrift var(--pd) var(--pdl) ease-in infinite;}
/* Avatar */
.card-fig{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:84%;z-index:3;animation:float var(--fd,4s) ease-in-out infinite;animation-delay:var(--fdl,0s);}
.card-fig svg{width:100%;height:auto;filter:drop-shadow(0 0 18px var(--glow-col)) drop-shadow(0 18px 36px rgba(0,0,0,.92));}
/* Glow under figure */
.card-glow{position:absolute;bottom:7%;left:50%;transform:translateX(-50%);width:68%;height:22%;border-radius:50%;background:var(--glow-col);filter:blur(18px);opacity:.22;z-index:2;animation:pulse var(--fd,4s) ease-in-out infinite;animation-delay:var(--fdl,0s);}
/* Top accent */
.card-bar{position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);z-index:6;opacity:.65;}
/* Vignette */
.card-vign{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 25%,transparent 18%,rgba(0,0,0,.55) 100%);z-index:4;transition:opacity .3s;opacity:.48;}
/* Info */
.card-info{position:absolute;bottom:0;left:0;right:0;z-index:7;padding:10px 9px 9px;background:linear-gradient(to top,rgba(0,0,0,.96) 55%,transparent);}
.card-emoji{font-size:10px;display:block;margin-bottom:2px;}
.card-name{font-size:clamp(12px,1.5vw,17px);font-weight:300;letter-spacing:.07em;display:block;transition:letter-spacing .28s;line-height:1.1;}
.card-role{font-family:'Rajdhani',sans-serif;font-size:clamp(5.5px,.75vw,7.5px);letter-spacing:.18em;text-transform:uppercase;color:var(--col);opacity:.72;margin-top:2px;display:block;}
.card-line{height:1px;background:var(--accent);width:0;transition:width .38s;margin-top:5px;}
.card-new{position:absolute;top:7px;right:7px;font-family:'Rajdhani',sans-serif;font-size:5.5px;letter-spacing:.12em;text-transform:uppercase;color:rgba(0,200,168,.9);border:1px solid rgba(0,200,168,.28);background:rgba(0,0,0,.75);padding:2px 4px;z-index:8;}

/* ── CINEMATIC CHAT ── */
#chat{position:fixed;inset:0;z-index:80;opacity:0;pointer-events:none;display:flex;flex-direction:column;background:#000;transition:opacity .65s;}
#chat.on{opacity:1;pointer-events:all;}
.chat-scene{position:absolute;inset:0;z-index:0;}
.chat-neb{position:absolute;inset:0;opacity:0;transition:opacity 1.2s;}
.chat-scan{position:absolute;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,180,160,.055),transparent);animation:scanLine 9s linear infinite;}
/* Cinematic letterbox */
.lb-top{position:absolute;top:0;left:0;right:0;height:clamp(26px,3.8vh,52px);background:#000;z-index:20;pointer-events:none;}
.lb-bot{position:absolute;bottom:0;left:0;right:0;height:clamp(88px,13vh,128px);background:#000;z-index:20;pointer-events:none;}
/* Minimal top bar */
.chat-bar{position:absolute;top:0;left:0;right:0;z-index:30;height:clamp(26px,3.8vh,52px);display:flex;align-items:center;padding:0 12px;gap:9px;}
.back{width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.55);font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(8px);}
.chat-nm{font-size:clamp(12px,1.7vw,17px);font-weight:200;letter-spacing:.1em;color:rgba(255,255,255,.65);}
.chat-rl{font-family:'Rajdhani',sans-serif;font-size:6px;letter-spacing:.2em;text-transform:uppercase;color:var(--rcol,rgba(0,200,168,.6));margin-left:auto;}
/* Main figure */
.chat-stage{position:absolute;inset:0;z-index:5;display:flex;align-items:flex-end;justify-content:center;}
.fig-aura{position:absolute;bottom:clamp(84px,12.5vh,125px);left:50%;width:clamp(150px,20vw,300px);height:clamp(190px,27vh,340px);border-radius:50%;z-index:1;animation:aura 5s ease-in-out infinite;transition:all .4s;}
.fig-aura.spk{animation:speaking .85s ease-in-out infinite!important;}
.chat-fig{width:clamp(155px,21vw,310px);position:relative;z-index:2;animation:float 5s ease-in-out infinite;filter:drop-shadow(0 0 28px var(--rglow,rgba(0,200,168,.5))) drop-shadow(0 28px 56px rgba(0,0,0,.99));margin-bottom:clamp(86px,12.5vh,126px);}
.chat-fig svg{width:100%;height:auto;}
/* Thinking dots */
.dw{position:absolute;bottom:clamp(108px,15.5vh,155px);left:50%;transform:translateX(-50%);z-index:35;opacity:0;transition:opacity .3s;}
.dw.on{opacity:1;}
.dots{display:flex;gap:6px;align-items:center;}
.dot{width:4px;height:4px;border-radius:50%;background:rgba(0,200,168,.55);animation:db .88s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:.18s}.dot:nth-child(3){animation-delay:.36s}
/* Input */
.chat-inp{position:absolute;bottom:0;left:0;right:0;z-index:30;padding:7px 14px 11px;display:flex;justify-content:center;}
.inp-row{display:flex;gap:7px;align-items:center;width:100%;max-width:450px;}
.mic{width:40px;height:40px;flex-shrink:0;border-radius:50%;background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.55);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(8px);transition:all .28s;-webkit-user-select:none;user-select:none;}
.mic.on{border-color:rgba(0,200,168,.45);color:rgba(0,200,168,.75);animation:mp 1s ease-in-out infinite;}
.txtin{flex:1;background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.08);padding:10px 13px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:rgba(255,255,255,.75);outline:none;border-radius:0;-webkit-appearance:none;backdrop-filter:blur(8px);}
.txtin:focus{border-color:rgba(0,200,168,.28);}
.txtin::placeholder{color:rgba(255,255,255,.15);}
.sendbtn{width:40px;height:40px;flex-shrink:0;background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.45);font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(8px);}
.sendbtn:active{border-color:rgba(0,200,168,.35);color:rgba(0,200,168,.65);}
</style>
</head>
<body>

<div class="space">
  <div class="space-deep"></div>
  <div class="neb-a"></div><div class="neb-b"></div><div class="neb-c"></div>
  <div class="stars" id="starsEl"></div>
  <div class="scan"></div>
</div>

<!-- OPENING -->
<div id="op">
  <div class="op-eye">Travis Peterson · Milan Michigan · Horizon Cosmos</div>
  <div class="op-t">Horizon <em>Cosmos</em></div>
  <div class="op-l"></div>
  <div class="op-s">26 Intelligences Await</div>
  <div class="op-btn" onclick="enterCosmos()">ENTER</div>
</div>

<!-- HUB -->
<div id="hub">
  <div class="hub-head">
    <div class="hub-eye">Horizon Cosmos · All Intelligences</div>
    <div class="hub-t">Select Your <em>Companion</em></div>
    <div class="hub-div"></div>
  </div>
  <div class="sec">⟡ The Simple Seven · The Foundation ⟡</div>
  <div class="grid" id="g1"></div>
  <div class="sec">⟡ New Arrivals · Just Entered The Hall ⟡</div>
  <div class="grid" id="g2"></div>
  <div class="sec">⟡ The Wave · 15 Companions ⟡</div>
  <div class="grid" id="g3"></div>
  <div style="height:36px"></div>
</div>

<!-- CHAT -->
<div id="chat">
  <div class="chat-scene">
    <div class="chat-neb" id="chatNeb"></div>
    <div class="chat-scan"></div>
  </div>
  <div class="lb-top"></div>
  <div class="lb-bot"></div>
  <div class="chat-bar">
    <div class="back" onclick="closeChat()">←</div>
    <div class="chat-nm" id="chatNm"></div>
    <div class="chat-rl" id="chatRl"></div>
  </div>
  <div class="chat-stage">
    <div class="fig-aura" id="figAura"></div>
    <div class="chat-fig" id="chatFig"></div>
  </div>
  <div class="dw" id="dw"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
  <div class="chat-inp">
    <div class="inp-row">
      <div class="mic" id="micBtn" onclick="toggleMic()"><span id="micIco">🎤</span></div>
      <input class="txtin" id="txtin" placeholder="Speak..." onkeydown="if(event.key==='Enter'){event.preventDefault();send()}"/>
      <div class="sendbtn" onclick="send()">→</div>
    </div>
  </div>
</div>

<script>
// STARS
(function(){
  var c=document.getElementById('starsEl');
  for(var i=0;i<320;i++){
    var s=document.createElement('div');
    var z=Math.random()*1.9+.1;
    s.className='star';
    s.style.cssText='left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;width:'+z+'px;height:'+z+'px;--d:'+(3+Math.random()*8)+'s;--dl:'+(Math.random()*9)+'s;opacity:'+(.3+Math.random()*.7)+';';
    c.appendChild(s);
  }
})();

// OPENING
function enterCosmos(){
  var op=document.getElementById('op');
  op.classList.add('out');
  setTimeout(function(){op.style.display='none';document.getElementById('hub').classList.add('on');},2000);
}
setTimeout(function(){if(document.getElementById('op').style.display!=='none')enterCosmos();},7500);

// SVG BUILDER
function mkSVG(o){
  var h=o.h||'#8B5E3C',hair=o.hair||'#1A0E08',eye=o.eye||'#3A2510',gl=o.gl||'rgba(255,255,255,.85)';
  var bc=o.bc||'#080400',bp=o.bp||'',hp=o.hp||'',hs=o.hs||'short',ms=o.ms||'smile';
  var hsvg='';
  if(hs==='short')hsvg='<path d="M38 36 Q40 10 70 8 Q100 10 102 36 Q94 18 70 16 Q46 18 38 36Z" fill="'+hair+'"/>';
  else if(hs==='long')hsvg='<path d="M38 36 Q40 10 70 8 Q100 10 102 36 Q96 14 70 12 Q44 14 38 36Z" fill="'+hair+'"/><path d="M38 36 L32 74 Q34 84 40 80 L42 50Z" fill="'+hair+'"/><path d="M102 36 L108 74 Q106 84 100 80 L98 50Z" fill="'+hair+'"/>';
  else if(hs==='curly')hsvg='<path d="M38 36 Q40 10 70 8 Q100 10 102 36Z" fill="'+hair+'"/><circle cx="44" cy="18" r="9" fill="'+hair+'"/><circle cx="57" cy="11" r="9" fill="'+hair+'"/><circle cx="70" cy="9" r="10" fill="'+hair+'"/><circle cx="83" cy="11" r="9" fill="'+hair+'"/><circle cx="96" cy="18" r="9" fill="'+hair+'"/>';
  else if(hs==='locs'){var h2=o.hair2||hair;hsvg='<path d="M38 32 Q40 8 70 6 Q100 8 102 32Z" fill="'+hair+'"/><path d="M38 32 L30 68 Q32 78 38 74 L40 48Z" fill="'+hair+'"/><path d="M44 28 L36 60 Q38 70 44 66 L46 44Z" fill="'+h2+'"/><path d="M102 32 L110 68 Q108 78 102 74 L100 48Z" fill="'+hair+'"/><path d="M96 28 L104 60 Q102 70 96 66 L94 44Z" fill="'+h2+'"/>';}
  else if(hs==='bun')hsvg='<path d="M38 36 Q40 10 70 8 Q100 10 102 36 Q96 18 70 16 Q44 18 38 36Z" fill="'+hair+'"/><circle cx="70" cy="8" r="11" fill="'+hair+'"/><circle cx="70" cy="8" r="6" fill="'+(o.hair2||hair)+'" opacity=".5"/>';
  else if(hs==='silver')hsvg='<path d="M38 36 Q40 10 70 8 Q100 10 102 36 Q96 14 70 12 Q44 14 38 36Z" fill="'+hair+'"/><path d="M38 36 L33 72 Q35 82 40 78 L42 52Z" fill="'+hair+'"/><path d="M102 36 L107 72 Q105 82 100 78 L98 52Z" fill="'+hair+'"/>';
  var mvg='';
  if(ms==='smile')mvg='<path id="mUL" d="M56 74 Q70 80 84 74 Q84 78 70 79 Q56 78 56 74Z" fill="#8B3A28" opacity=".6"/><path id="mLL" d="M56 74 Q70 82 84 74" stroke="#3d1a08" stroke-width="1.8" fill="none" stroke-linecap="round"/>';
  else if(ms==='grin')mvg='<path id="mUL" d="M54 72 Q70 80 86 72 Q86 76 70 78 Q54 76 54 72Z" fill="#f5efe0" opacity=".88"/><path id="mLL" d="M52 72 Q70 84 88 72" stroke="#3d1a08" stroke-width="2" fill="none" stroke-linecap="round"/>';
  else if(ms==='stern')mvg='<path id="mUL" d="M58 74 Q70 74 82 74 Q82 76 70 76 Q58 76 58 74Z" fill="#3d1a08" opacity=".5"/><path id="mLL" d="M58 74 Q70 76 82 74" stroke="#3d1a08" stroke-width="2" fill="none" stroke-linecap="round"/>';
  else if(ms==='soft')mvg='<path id="mUL" d="M61 74 Q70 77 79 74 Q79 77 70 78 Q61 77 61 74Z" fill="#8B3A28" opacity=".45"/><path id="mLL" d="M59 74 Q70 79 81 74" stroke="#4a2010" stroke-width="1.5" fill="none" stroke-linecap="round"/>';
  else if(ms==='serene')mvg='<path id="mUL" d="M60 73 Q70 75 80 73 Q80 75 70 76 Q60 75 60 73Z" fill="#4a2818" opacity=".4"/><path id="mLL" d="M60 73 Q70 77 80 73" stroke="#4a2818" stroke-width="1.4" fill="none" stroke-linecap="round"/>';
  return '<svg viewBox="0 0 140 168" fill="none">'
    +'<path d="M15 168 L15 112 Q15 95 32 87 L52 79 L70 96 L88 79 L108 87 Q125 95 125 112 L125 168Z" fill="'+bc+'"/>'+bp
    +'<rect x="63" y="72" width="14" height="14" rx="3" fill="'+h+'"/>'
    +'<ellipse cx="70" cy="50" rx="34" ry="36" fill="'+h+'"/>'
    +'<ellipse cx="37" cy="54" rx="7" ry="13" fill="'+h+'"/><ellipse cx="103" cy="54" rx="7" ry="13" fill="'+h+'"/>'
    +'<ellipse cx="37" cy="54" rx="4" ry="8" fill="'+h+'" opacity=".5"/><ellipse cx="103" cy="54" rx="4" ry="8" fill="'+h+'" opacity=".5"/>'
    +hsvg+hp
    +'<path d="M47 40 Q57 35 65 39" stroke="'+hair+'" stroke-width="2.8" stroke-linecap="round" fill="none"/>'
    +'<path d="M75 39 Q83 35 93 40" stroke="'+hair+'" stroke-width="2.8" stroke-linecap="round" fill="none"/>'
    +'<ellipse cx="57" cy="51" rx="10" ry="9" fill="white"/><ellipse cx="83" cy="51" rx="10" ry="9" fill="white"/>'
    +'<circle cx="57" cy="51" r="5.5" fill="'+eye+'"/><circle cx="57" cy="51" r="3.5" fill="#050508"/>'
    +'<ellipse cx="59.5" cy="48.5" rx="2" ry="1.6" fill="'+gl+'" opacity=".92"/>'
    +'<circle cx="83" cy="51" r="5.5" fill="'+eye+'"/><circle cx="83" cy="51" r="3.5" fill="#050508"/>'
    +'<ellipse cx="85.5" cy="48.5" rx="2" ry="1.6" fill="'+gl+'" opacity=".92"/>'
    +'<path class="blL" d="M47 51 Q57 42 67 51" fill="'+h+'" opacity="0"/>'
    +'<path class="blR" d="M73 51 Q83 42 93 51" fill="'+h+'" opacity="0"/>'
    +'<path d="M66 62 Q70 67 74 62" stroke="'+h+'" stroke-width="1.5" fill="none" stroke-linecap="round" opacity=".5"/>'

  var g=document.getElementById(gid);
  C.filter(function(c){return c.gr===group;}).forEach(function(c,i){
    var card=document.createElement('div');
    card.className='card';
    card.style.setProperty('--ad',(ds+i*.055)+'s');
    card.style.setProperty('--fd',(3.5+Math.random()*1.2)+'s');
    card.style.setProperty('--fdl',(i*.14)+'s');
    card.style.setProperty('--col',c.col);
    card.style.setProperty('--glow-col',c.gl);
    card.style.setProperty('--accent',c.ac);
    card.style.setProperty('--atm',c.atm);
    // Particles
    var pts='<div class="card-parts">';
    for(var p=0;p<5;p++){
      var px=(Math.random()-.5)*50;
      pts+='<div class="prt" style="left:'+(15+Math.random()*70)+'%;bottom:'+(8+Math.random()*35)+'%;--pd:'+(5+Math.random()*5)+'s;--pdl:'+(Math.random()*6)+'s;--px:'+px+'px;"></div>';
    }
    pts+='</div>';
    card.innerHTML='<div class="card-atm"></div>'+pts
      +'<div class="card-glow"></div>'
      +'<div class="card-fig">'+c.svg+'</div>'
      +'<div class="card-bar"></div>'
      +'<div class="card-vign"></div>'
      +'<div class="card-info">'
        +'<span class="card-emoji">'+c.emoji+'</span>'
        +'<span class="card-name">'+c.name+'</span>'
        +'<span class="card-role">'+c.role+'</span>'
        +'<div class="card-line"></div>'
      +'</div>'
      +(c.nw?'<div class="card-new">NEW</div>':'');
    card.onclick=function(){openChat(c);};
    g.appendChild(card);
  });
}
buildGrid('g1','seven',0);
buildGrid('g2','arrivals',.5);
buildGrid('g3','wave',.9);

// Blink
setInterval(function(){
  document.querySelectorAll('.card').forEach(function(el){
    if(Math.random()<.04){
      el.querySelectorAll('.blL').forEach(function(b){b.style.opacity='1';});
      el.querySelectorAll('.blR').forEach(function(b){b.style.opacity='1';});
      setTimeout(function(){
        el.querySelectorAll('.blL').forEach(function(b){b.style.opacity='0';});
        el.querySelectorAll('.blR').forEach(function(b){b.style.opacity='0';});
      },130);
    }
  });
},1900);

// CHAT ENGINE
var cur=null,hist=[],busy=false;
var SY=window.speechSynthesis,voices=[],mInt=null,isSpeaking=false,resumeInt=null;
var recog=null,lstn=false;
function loadV(){if(SY)voices=SY.getVoices();}
if(SY){loadV();if(SY.onvoiceschanged!==undefined)SY.onvoiceschanged=loadV;}

function openChat(c){
  cur=c;hist=[];
  var chat=document.getElementById('chat');
  document.getElementById('chatNeb').style.background=c.atm;
  document.getElementById('chatNeb').style.opacity='1';
  document.getElementById('figAura').style.background='radial-gradient(ellipse,'+c.gl.replace('.6','.2').replace('.5','.18')+' 0%,transparent 70%)';
  document.getElementById('chatFig').innerHTML=c.svg;
  document.getElementById('chatNm').textContent=c.name;
  document.getElementById('chatRl').textContent=c.role;
  document.getElementById('chatRl').style.color=c.col;
  chat.style.setProperty('--rcol',c.col);
  chat.style.setProperty('--rglow',c.gl);
  document.getElementById('txtin').placeholder='Speak to '+c.name+'...';
  document.getElementById('hub').classList.add('off');
  chat.classList.add('on');
  if(SY){var u=new SpeechSynthesisUtterance('');SY.speak(u);SY.cancel();}
  loadV();setTimeout(loadV,400);setTimeout(loadV,900);
  setTimeout(function(){
    go('Someone has arrived to speak with you in Horizon Cosmos. Welcome them briefly in your natural voice and ask one question to begin. Do not say your name or role. 2-3 sentences.');
  },800);
}

function closeChat(){
  if(SY)SY.cancel();
  clearInterval(mInt);clearInterval(resumeInt);stopL();done();
  document.getElementById('chat').classList.remove('on');
  document.getElementById('chatNeb').style.opacity='0';
  document.getElementById('hub').classList.remove('off');
  cur=null;hist=[];busy=false;
}

function mouth(o){
  var fig=document.getElementById('chatFig');if(!fig)return;
  var ul=fig.querySelector('#mUL'),ll=fig.querySelector('#mLL');if(!ul||!ll)return;
  var bY=74,lx=56,rx=84,cx=70;
  if(o>0.05){
    var d=o*6,r=o*4;
    ul.setAttribute('d','M'+lx+' '+(bY-r*.3)+' Q'+(lx+8)+' '+(bY-4-r*.6)+' '+cx+' '+(bY-3-r*.5)+' Q'+(rx-8)+' '+(bY-4-r*.6)+' '+rx+' '+(bY-r*.3)+' Q'+(rx-8)+' '+(bY+3-r*.1)+' '+cx+' '+(bY+2)+' Q'+(lx+8)+' '+(bY+3-r*.1)+' '+lx+' '+(bY-r*.3)+'Z');
    ll.setAttribute('d','M'+lx+' '+(bY+d*.2)+' Q'+cx+' '+(bY+6+d)+' '+rx+' '+(bY+d*.2)+' Q'+(rx-8)+' '+(bY+5+d*.9)+' '+cx+' '+(bY+6+d)+' Q'+(lx+8)+' '+(bY+5+d*.9)+' '+lx+' '+(bY+d*.2)+'Z');
  }else{
    ul.setAttribute('d','M'+lx+' '+bY+' Q'+(lx+8)+' '+(bY-4)+' '+cx+' '+(bY-3)+' Q'+(rx-8)+' '+(bY-4)+' '+rx+' '+bY+' Q'+(rx-8)+' '+(bY+3)+' '+cx+' '+(bY+2)+' Q'+(lx+8)+' '+(bY+3)+' '+lx+' '+bY+'Z');
    ll.setAttribute('d','M'+lx+' '+bY+' Q'+cx+' '+(bY+6)+' '+rx+' '+bY+' Q'+(rx-8)+' '+(bY+5)+' '+cx+' '+(bY+6)+' Q'+(lx+8)+' '+(bY+5)+' '+lx+' '+bY+'Z');
  }
}

function speak(txt){
  if(!SY||!txt||!cur)return;
  SY.cancel();clearInterval(mInt);clearInterval(resumeInt);mouth(0);
  var u=new SpeechSynthesisUtterance(txt);
  var v=null;
  for(var i=0;i<cur.vn.length;i++){v=voices.filter(function(x){return x.name.toLowerCase().indexOf(cur.vn[i])>=0;})[0];if(v)break;}
  if(!v)v=voices.filter(function(x){return x.lang&&x.lang.indexOf('en')===0;})[0];
  if(v)u.voice=v;
  u.rate=cur.rate||.84;u.pitch=cur.pitch||.91;u.volume=1;
  u.onstart=function(){
    isSpeaking=true;
    document.getElementById('figAura').classList.add('spk');
    var ph=0,p=[.7,.88,.12,.82,.94,.15,.56,.86,.22,.66,.78,.1,.9,.6,.2,.84];
    mInt=setInterval(function(){mouth(Math.max(0,Math.min(1,p[ph++%p.length]+(Math.random()-.5)*.22)));},105);
    resumeInt=setInterval(function(){if(SY.speaking&&SY.paused)SY.resume();},9000);
  };
  u.onend=function(){done();};
  u.onerror=function(e){if(e.error!=='interrupted'&&e.error!=='canceled')done();};
  setTimeout(function(){try{SY.speak(u);}catch(e){}},60);
}

function done(){
  isSpeaking=false;clearInterval(mInt);clearInterval(resumeInt);mouth(0);
  var a=document.getElementById('figAura');if(a)a.classList.remove('spk');
  document.getElementById('dw').classList.remove('on');
}

var KEY='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';

function go(input){
  if(busy||!input||!cur)return;
  busy=true;
  document.getElementById('dw').classList.add('on');
  hist.push({role:'user',content:String(input)});
  if(hist.length>14)hist=hist.slice(-14);
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','x-api-key':KEY,'anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:260,system:cur.sys+' Horizon Cosmos by Travis Peterson, Milan Michigan. Stay in character completely.',messages:hist})
  })
  .then(function(r){return r.text();})
  .then(function(txt){
    var reply='';
    try{var d=JSON.parse(txt);if(d&&d.content){for(var i=0;i<d.content.length;i++){if(d.content[i].type==='text')reply+=d.content[i].text;}}else if(d&&d.error){reply='';}}catch(e){reply='';}
    if(!reply)reply='...';
    hist.push({role:'assistant',content:reply});
    var clean=reply.replace(/\[CARD\][\s\S]*?\[\/CARD\]/g,'').trim();
    document.getElementById('dw').classList.remove('on');
    speak(clean);busy=false;
  })
  .catch(function(){document.getElementById('dw').classList.remove('on');busy=false;});
}

function send(){var t=document.getElementById('txtin').value.trim();if(!t||busy)return;document.getElementById('txtin').value='';go(t);}
function toggleMic(){if(lstn)stopL();else startL();}
function startL(){
  if(isSpeaking&&SY)SY.cancel();
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR)return;
  recog=new SR();recog.continuous=false;recog.interimResults=false;recog.lang='en-US';
  recog.onresult=function(e){stopL();go(e.results[0][0].transcript);};
  recog.onerror=function(){stopL();};recog.onend=function(){if(lstn)stopL();};
  lstn=true;try{recog.start();}catch(e){lstn=false;return;}
  document.getElementById('micBtn').classList.add('on');
  document.getElementById('micIco').textContent='🔴';
}
function stopL(){
  lstn=false;if(recog)try{recog.stop();}catch(e){}
  var mb=document.getElementById('micBtn');if(mb)mb.classList.remove('on');
  document.getElementById('micIco').textContent='🎤';
}
window.addEventListener('beforeunload',function(){try{if(SY)SY.cancel();}catch(e){}});
</script>
