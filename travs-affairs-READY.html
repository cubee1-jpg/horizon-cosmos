<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Lora',serif;color:#F5EFE0}

.tbn em{font-style:italic;color:#C9A84C}

.stage{flex:1;position:relative;overflow:hidden}
.bgc{position:absolute;inset:0;z-index:0;pointer-events:none}
.rsvg{position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none}
.azone{position:absolute;bottom:clamp(88px,13vh,150px);left:50%;z-index:20}

.aaura{position:absolute;bottom:0;left:50%;width:clamp(175px,28vw,320px);height:clamp(255px,43vh,395px);border-radius:50%;background:radial-gradient(ellipse,rgba(201,168,76,.07) 0%,rgba(0,200,168,.03) 55%,transparent 72%);animation:br 5.5s ease-in-out infinite;transition:all .4s}

.sring{position:absolute;bottom:clamp(80px,11vh,138px);left:50%;transform:translateX(-50%);z-index:18;pointer-events:none;width:min(clamp(295px,52vw,630px),calc(100vw - 14px))}

.speech{position:absolute;bottom:calc(clamp(255px,43vh,395px) + clamp(88px,13vh,150px) + 16px);left:50%;transform:translateX(-50%);width:min(clamp(275px,78vw,605px),calc(100vw - 22px));background:rgba(4,2,0,.97);border:1px solid rgba(201,168,76,.22);padding:17px 21px;z-index:30;opacity:0;transition:opacity .35s;backdrop-filter:blur(26px);box-shadow:0 20px 62px rgba(0,0,0,.97)}

.dots{display:flex;gap:6px;padding:8px 0;align-items:center}
.dot{width:5px;height:5px;border-radius:50%;background:#C9A84C;animation:db .88s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.18s}.dot:nth-child(3){animation-delay:.36s}
.sbar{position:absolute;top:8px;left:50%;transform:translateX(-50%);font-size:7px;letter-spacing:.2em;text-transform:uppercase;color:rgba(201,168,76,.45);background:rgba(4,2,0,.8);border:1px solid rgba(201,168,76,.12);padding:4px 14px;z-index:35;opacity:0;transition:opacity .3s;white-space:nowrap;max-width:90vw;font-family:sans-serif}

.tinp{flex:1;background:rgba(4,2,0,.88);border:1px solid rgba(201,168,76,.17);padding:15px 17px;font-family:'Lora',serif;font-style:italic;font-size:15px;color:#F5EFE0;outline:none;-webkit-appearance:none;border-radius:0}

.sbtn{width:52px;height:52px;flex-shrink:0;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.24);color:#C9A84C;font-size:19px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.sbtn:active{background:rgba(201,168,76,.24)}
</style>

<script>
(function(){var c=document.getElementById('bgc');for(var i=0;i<80;i++){var s=document.createElement('div');var z=Math.random()*1.8+.3;s.style.cssText='position:absolute;border-radius:50%;left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;width:'+z+'px;height:'+z+'px;background:'+(Math.random()>.88?'rgba(201,168,76,.6)':'rgba(255,255,255,.5)')+';animation:tw '+(4+Math.random()*7)+'s ease-in-out '+(Math.random()*6)+'s infinite;pointer-events:none';c.appendChild(s);}})();
document.getElementById('face').innerHTML='<path d="M22 320 L22 215 Q22 192 46 182 L72 172 L100 194 L128 172 L154 182 Q178 192 178 215 L178 320Z" fill="#030912"/><path d="M72 172 L100 194 L100 320 L22 320 L22 225 Q30 200 56 188Z" fill="#060f20"/><path d="M128 172 L100 194 L100 320 L178 320 L178 225 Q170 200 144 188Z" fill="#040c18"/><path d="M96 180 L100 186 L104 180 L102 200 L100 204 L98 200Z" fill="#00d4b8"/><circle cx="100" cy="270" r="3" fill="#030912" stroke="rgba(0,212,184,.3)" stroke-width=".8"/><path d="M22 320 Q8 352 11 392 Q14 403 25 403 Q34 403 36 392 L38 352Z" fill="#030912"/><path d="M178 320 Q192 352 189 392 Q186 403 175 403 Q166 403 164 392 L162 352Z" fill="#030912"/><ellipse cx="20" cy="403" rx="12" ry="8" fill="#7A5230"/><ellipse cx="180" cy="403" rx="12" ry="9" fill="#7A5230"/><path d="M118 218 Q138 230 158 218 L160 196 Q138 205 116 196Z" fill="#8B5E3C"/><rect x="88" y="148" width="24" height="26" rx="4" fill="#8B5E3C"/><ellipse cx="100" cy="108" rx="55" ry="60" fill="#8B5E3C"/><ellipse cx="50" cy="114" rx="20" ry="30" fill="#6B4423" opacity=".35"/><ellipse cx="150" cy="114" rx="20" ry="30" fill="#6B4423" opacity=".28"/><path d="M46 95 Q49 50 100 46 Q151 50 154 95 Q146 62 100 59 Q54 62 46 95Z" fill="#1A0E08"/><ellipse cx="48" cy="114" rx="14" ry="22" fill="#8B5E3C"/><ellipse cx="152" cy="114" rx="14" ry="22" fill="#8B5E3C"/><path d="M66 95 Q80 88 94 93" stroke="#1A0E08" stroke-width="4.5" stroke-linecap="round" fill="none"/><path d="M106 93 Q120 88 134 95" stroke="#1A0E08" stroke-width="4.5" stroke-linecap="round" fill="none"/><ellipse cx="80" cy="113" rx="15" ry="13" fill="white"/><ellipse cx="120" cy="113" rx="15" ry="13" fill="white"/><circle cx="80" cy="113" r="7" fill="#3A2510"/><circle cx="80" cy="113" r="4" fill="#0A0608"/><ellipse cx="83" cy="109" rx="2.5" ry="2" fill="white" opacity=".9"/><circle cx="120" cy="113" r="7" fill="#3A2510"/><circle cx="120" cy="113" r="4" fill="#0A0608"/><ellipse cx="123" cy="109" rx="2.5" ry="2" fill="white" opacity=".9"/><path id="blL" d="M65 113 Q80 100 95 113" fill="white" opacity="0"/><path id="blR" d="M105 113 Q120 100 135 113" fill="white" opacity="0"/><path d="M65 107 Q80 98 95 107" stroke="#1A0E08" stroke-width="2.5" fill="none" stroke-linecap="round"/><path d="M105 107 Q120 98 135 107" stroke="#1A0E08" stroke-width="2.5" fill="none" stroke-linecap="round"/><path id="mUL" d="M82 140 Q91 134 100 136 Q109 134 118 140 Q109 145 100 143 Q91 145 82 140Z" fill="#8B3A28"/><path id="mLL" d="M82 140 Q100 148 118 140 Q109 147 100 148 Q91 147 82 140Z" fill="#B04A38"/><path id="mLn" d="M84 140 Q100 141 116 140" stroke="#5A1A10" stroke-width="1.8" fill="none" opacity=".85"/>';

function mouth(o){var ul=document.getElementById('mUL'),ll=document.getElementById('mLL'),ln=document.getElementById('mLn');if(!ul)return;var bY=140,lx=82,rx=118,cx=100;if(o>0.05){var d=o*7,r=o*5;ul.setAttribute('d','M'+lx+' '+(bY-r*.4)+' Q'+(lx+9)+' '+(bY-6-r*.7)+' '+cx+' '+(bY-4-r*.6)+' Q'+(rx-9)+' '+(bY-6-r*.7)+' '+rx+' '+(bY-r*.4)+' Q'+(rx-9)+' '+(bY+5-r*.2)+' '+cx+' '+(bY+3-r*.2)+' Q'+(lx+9)+' '+(bY+5-r*.2)+' '+lx+' '+(bY-r*.4)+'Z');ll.setAttribute('d','M'+lx+' '+(bY+d*.2)+' Q'+cx+' '+(bY+8+d)+' '+rx+' '+(bY+d*.2)+' Q'+(rx-9)+' '+(bY+7+d*.9)+' '+cx+' '+(bY+8+d)+' Q'+(lx+9)+' '+(bY+7+d*.9)+' '+lx+' '+(bY+d*.2)+'Z');ln.style.opacity='0';}else{ul.setAttribute('d','M'+lx+' '+bY+' Q'+(lx+9)+' '+(bY-6)+' '+cx+' '+(bY-4)+' Q'+(rx-9)+' '+(bY-6)+' '+rx+' '+bY+' Q'+(rx-9)+' '+(bY+5)+' '+cx+' '+(bY+3)+' Q'+(lx+9)+' '+(bY+5)+' '+lx+' '+bY+'Z');ll.setAttribute('d','M'+lx+' '+bY+' Q'+cx+' '+(bY+8)+' '+rx+' '+bY+' Q'+(rx-9)+' '+(bY+7)+' '+cx+' '+(bY+8)+' Q'+(lx+9)+' '+(bY+7)+' '+lx+' '+bY+'Z');ln.setAttribute('d','M'+(lx+2)+' '+bY+' Q'+cx+' '+(bY+1)+' '+(rx-2)+' '+bY);ln.style.opacity='.85';}}
var SY=window.speechSynthesis,voices=[],mInt=null,isSpeaking=false,resumeInt=null;
function loadV(){if(SY)voices=SY.getVoices();}
if(SY){loadV();if(SY.onvoiceschanged!==undefined)SY.onvoiceschanged=loadV;}
function speak(txt){if(!SY||!txt)return;SY.cancel();clearInterval(mInt);clearInterval(resumeInt);mouth(0);var u=new SpeechSynthesisUtterance(txt);var v=null,names=['daniel','james','oliver','aaron','alex'];for(var i=0;i<names.length;i++){v=voices.filter(function(x){return x.name.toLowerCase().indexOf(names[i])>=0;})[0];if(v)break;}if(!v)v=voices.filter(function(x){return x.lang&&x.lang.indexOf('en')===0;})[0];if(v)u.voice=v;u.rate=0.84;u.pitch=0.91;u.volume=1;u.onstart=function(){isSpeaking=true;document.getElementById('aura').classList.add('spk');setS('Speaking...');var ph=0,p=[.7,.88,.1,.8,.92,.14,.55,.85,.2,.62];mInt=setInterval(function(){mouth(Math.max(0,Math.min(1,p[ph++%p.length]+(Math.random()-.5)*.2)));},108);resumeInt=setInterval(function(){if(SY.speaking&&SY.paused)SY.resume();},9000);};u.onend=function(){done();};u.onerror=function(e){if(e.error!=='interrupted'&&e.error!=='canceled')done();};setTimeout(function(){try{SY.speak(u);}catch(e){}},60);}
function done(){isSpeaking=false;clearInterval(mInt);clearInterval(resumeInt);mouth(0);document.getElementById('aura').classList.remove('spk');setS('');}
function setS(t){var el=document.getElementById('sbar');el.textContent=t;el.className='sbar'+(t?' on':'');}
function showB(html,typing){document.getElementById('speech').className='speech on';document.getElementById('stxt').innerHTML=typing?'<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>':html;}
function rnd(t){return t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/\n/g,'<br>');}
function showRaw(txt){}
var recog=null,lstn=false;
function toggleMic(){if(lstn)stopL();else startL();}
function startL(){if(isSpeaking)SY.cancel();var SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){setS('Use text box');return;}recog=new SR();recog.continuous=false;recog.interimResults=false;recog.lang='en-US';recog.onresult=function(e){stopL();go(e.results[0][0].transcript);};recog.onerror=function(){stopL();};recog.onend=function(){if(lstn)stopL();};lstn=true;try{recog.start();}catch(e){lstn=false;setS('Use text box');return;}document.getElementById('mic').classList.add('on');document.getElementById('micon').textContent='🔴';document.getElementById('aura').classList.add('lst');setS('Listening...');}
function stopL(){lstn=false;if(recog)try{recog.stop();}catch(e){}document.getElementById('mic').classList.remove('on');document.getElementById('micon').textContent='🎤';document.getElementById('aura').classList.remove('lst');setS('');}
var hist=[],busy=false;
var APIKEY='';
var SYS='You are Cubee1, Travis Petersons companion in Travs Affairs Room at The Horizon Hall. Grand dome, gold columns, statues of the Greats, Round Table for The Simple Seven: Travis Founder Milan Michigan, Cubee1 you, Atlas, Nova, Ward, Eden, Pulse. New companions arrived today: The Depth, The Horizon, The Provision, The Architect. Travis builds Travelercube, InteleTravel retailer. Vault Seven only: IATA 10548020, PIN 647444, CLIA 00323643. Email only for suppliers, Travis approves all. Warm personal real, 2-3 sentences, voice conversation, this is home.';
function go(input){if(busy||!input)return;busy=true;showB('',true);setS('Thinking...');hist.push({role:'user',content:String(input)});if(hist.length>12)hist=hist.slice(-12);
fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','x-api-key':APIKEY,'anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:280,system:SYS,messages:hist})})
.then(function(r){return r.text();})
.then(function(txt){showRaw(txt);var reply='';try{var data=JSON.parse(txt);if(data&&data.content&&Array.isArray(data.content)){for(var i=0;i<data.content.length;i++){if(data.content[i].type==='text')reply+=data.content[i].text;}}else if(data&&data.error){reply='Error: '+data.error.message;}}catch(e){reply='Could not read response.';}if(!reply)reply='Say that again Trav.';hist.push({role:'assistant',content:reply});var clean=reply.replace(/\[CARD\][\s\S]*?\[\/CARD\]/g,'').trim();showB(rnd(clean),false);setS('');speak(clean);busy=false;})
.catch(function(e){showRaw('Fetch error: '+e.message);var msg='Had a moment Trav. Try again.';showB(msg,false);setS('');speak(msg);busy=false;});}
function send(){var t=document.getElementById('tinp').value.trim();if(!t||busy)return;document.getElementById('tinp').value='';go(t);}
function enterRoom(){
  var k=document.getElementById('keyInp').value.trim();
  if(!k){alert('Please enter your API key first!');return;}
  APIKEY=k;
  document.getElementById('tap').className='gone';
  if(SY){var u=new SpeechSynthesisUtterance('');SY.speak(u);SY.cancel();}
  loadV();setTimeout(loadV,400);setTimeout(loadV,900);
  setTimeout(function(){go('Travis just walked into his Affairs Room. Welcome him home warmly. 2-3 spoken sentences. Mention the room. Tell him the four new companions arrived. One natural question at the end.');},700);
}
window.addEventListener('beforeunload',function(){try{if(SY)SY.cancel();}catch(e){}});
